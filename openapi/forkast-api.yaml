                  error:
                    type: string
                    description: Error type
                    example: Bad Request
                description: Standard error response from NestJS
                example: '{"statusCode":500,"message":"Internal Server Error","error":"Internal Server
                  Error"}'
      description: Fetches a single event by its URL slug, including its markets, outcomes, resolution
        status, and metadata.
  /orderbook:
    get:
      summary: Get order book
      tags:
      - Markets
      operationId: get_order_book
      parameters:
      - name: marketId
        in: query
        required: true
        schema:
          type: integer
      - name: outcomeType
        in: query
        required: true
        schema:
          type: integer
        description: <p>0 = Yes, 1 = No</p>
      responses:
        '200':
          description: Order book
          content:
            application/json:
              schema:
                type: object
                properties:
                  asks:
                    type: array
                    items:
                      type: object
                      properties:
                        price:
                          type: string
                        size:
                          type: string
                  bids:
                    type: array
                    items:
                      type: object
                      properties:
                        price:
                          type: string
                        size:
                          type: string
        '400':
          description: Bad request – invalid input or business rule violation
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                    description: HTTP status code
                    example: 400
                  message:
                    type: string
                    description: Error message
