                    description: Error message
                    example: Bad Request
                  error:
                    type: string
                    description: Error type
                    example: Bad Request
                description: Standard error response from NestJS
                example: '{"statusCode":500,"message":"Internal Server Error","error":"Internal Server
                  Error"}'
      description: 'Returns the live order book (bids and asks with price levels and sizes) for a market
        outcome. `outcomeType` selects the side: 0 = Yes, 1 = No.'
