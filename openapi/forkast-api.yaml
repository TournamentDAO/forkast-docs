openapi: 3.0.3
info:
  title: Forkast API
  description: REST API for the Forkast prediction-market platform.
  version: 1.0.0
servers:
- url: https://mgapi.forkast.gg/api/v1
  description: Mainnet
tags:
- name: Auth
- name: User
- name: Markets
- name: Balances
- name: Positions
- name: Orders
- name: Categories
paths:
  /auth:
    post:
      summary: Login with signed message
      tags:
      - Auth
      operationId: login_with_signed_message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                address:
                  type: string
                  description: Wallet address
                  example: '0x1234567890123456789012345678901234567890'
                signature:
                  type: string
                  description: Signed message from wallet
                message:
                  type: string
                  description: Must be 'Welcome to Forkast!'
                  example: Welcome to Forkast!
              required:
              - address
              - signature
              - message
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                  walletSalt:
                    type: string
                  refreshToken:
                    type: string
                  proxyWallet:
                    type: string
                required:
                - accessToken
                - walletSalt
                - refreshToken
                - proxyWallet
        '400':
          description: Bad request – invalid signature or payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                    description: HTTP status code
                    example: 400
                  message:
                    type: string
                    description: Error message
                    example: Bad Request
                  error:
                    type: string
                    description: Error type
                    example: Bad Request
                description: Standard error response from NestJS
              examples:
                GENERATED:
                  value:
                    statusCode: 400
                    message: Bad Request
                    error: Bad Request
                wrongMessage:
                  value:
                    statusCode: 400
                    message: Wrong message payload. Please try again
                    error: Bad Request
                invalidSignature:
                  value:
                    statusCode: 400
                    message: 'Invalid signature: ...'
                    error: Bad Request
                invalidEmail:
                  value:
                    statusCode: 400
                    message: Please provide a valid email address.
                    error: Bad Request
        '401':
          description: Unauthorized – session verification failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                    description: HTTP status code
                    example: 400
                  message:
                    type: string
                    description: Error message
                    example: Bad Request
                  error:
                    type: string
                    description: Error type
                    example: Bad Request
                description: Standard error response from NestJS
              examples:
                GENERATED:
                  value:
                    statusCode: 400
                    message: Bad Request
                    error: Bad Request
                permissionDenied:
                  value:
                    statusCode: 401
                    message: User permission denied
                    error: Unauthorized
                fakeUser:
                  value:
                    statusCode: 401
                    message: User's identity not verified
                    error: Unauthorized
        '429':
          description: Too many requests – rate limit exceeded
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                    description: HTTP status code
                    example: 400
                  message:
                    type: string
                    description: Error message
                    example: Bad Request
                  error:
                    type: string
                    description: Error type
                    example: Bad Request
                description: Standard error response from NestJS
                example: '{"statusCode":429,"message":"Too Many Requests","error":"Too Many Requests"}'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                    description: HTTP status code
                    example: 400
                  message:
                    type: string
                    description: Error message
                    example: Bad Request
                  error:
                    type: string
                    description: Error type
                    example: Bad Request
                description: Standard error response from NestJS
                example: '{"statusCode":500,"message":"Internal Server Error","error":"Internal Server
                  Error"}'
      description: 'Authenticate with a Web3 wallet. Submit the wallet-signed login message together with
        your session ID to receive a JWT access token, refresh token, and user record. Pass the token
        as `Authorization: Bearer <token>` on all authenticated endpoints.'
  /user/profile:
    get:
      summary: Get user profile
      tags:
      - User
      operationId: get_user_profile
      security:
      - bearerAuth: []
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  email:
                    type: string
                  bio:
                    type: string
                  avatar:
                    type: string
                  wallet:
                    type: string
                  proxyWallet:
                    type: string
                  hasActiveProxyWallet:
                    type: integer
                    example: 0
                  isRegionWarningChecked:
                    type: integer
                    example: 0
                  referralCode:
                    type: string
                  isReferred:
                    type: string
                    description: '(format: boolean,null)'
                  referredAt:
                    type: string
                    description: '(format: string,null)'
                  isWonMarket:
                    type: integer
                    example: 0
        '401':
          description: Unauthorized – missing, invalid, or expired token
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                    description: HTTP status code
                    example: 400
                  message:
                    type: string
                    description: Error message
                    example: Bad Request
                  error:
                    type: string
                    description: Error type
                    example: Bad Request
                description: Standard error response from NestJS
              examples:
                GENERATED:
                  value:
                    statusCode: 400
                    message: Bad Request
                    error: Bad Request
                invalidToken:
                  value:
                    statusCode: 401
                    message: Invalid token
                    error: Unauthorized
                expiredToken:
                  value:
                    statusCode: 401
                    message: Expired token
                    error: Unauthorized
                missingBearer:
                  value:
                    statusCode: 401
                    message: 'Authorization: Bearer <token> header missing'
                    error: Unauthorized
        '429':
          description: Too many requests – rate limit exceeded
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                    description: HTTP status code
                    example: 400
                  message:
                    type: string
                    description: Error message
                    example: Bad Request
                  error:
                    type: string
                    description: Error type
                    example: Bad Request
                description: Standard error response from NestJS
                example: '{"statusCode":429,"message":"Too Many Requests","error":"Too Many Requests"}'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                    description: HTTP status code
                    example: 400
                  message:
                    type: string
                    description: Error message
                    example: Bad Request
                  error:
                    type: string
                    description: Error type
                    example: Bad Request
                description: Standard error response from NestJS
                example: '{"statusCode":500,"message":"Internal Server Error","error":"Internal Server
                  Error"}'
      description: Returns the authenticated user's profile, including display name, avatar, wallet and
        proxy-wallet addresses, and account preference flags.
