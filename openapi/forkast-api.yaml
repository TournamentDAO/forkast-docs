  /markets/get-by-slug/{slug}:
    get:
      summary: Get event by slug
      tags:
      - Markets
      operationId: get_event_by_slug
      parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Event response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 0
                      createdAt:
                        type: string
                      title:
                        type: string
                      description:
                        type: string
                      status:
                        type: string
                      startDate:
                        type: string
                      endDate:
                        type: string
                      image:
                        type: string
                      resolutionSource:
                        type: string
                      volume:
                        type: string
                      resolvedOn:
                        type: string
                        description: '(format: string,null)'
                      categoryIds:
                        type: array
                        items: {}
                      fixtureId:
                        type: string
                        description: '(format: string,null)'
                      isFavorite:
                        type: integer
                        example: 0
                      markets:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: integer
                              example: 0
                            title:
                              type: string
                            question:
                              type: string
                            questionId:
                              type: string
                            startDate:
                              type: string
                            endDate:
                              type: string
                            image:
                              type: string
                            rules:
                              type: string
                            volume:
                              type: string
                            status:
                              type: string
                            resolvedAddress:
                              type: string
                              description: '(format: string,null)'
                            resolvedOutcome:
                              type: string
                              description: '(format: string,null)'
                            resolvedOutcomeId:
                              type: string
                              description: '(format: string,null)'
                            resolvedOn:
                              type: string
                              description: '(format: string,null)'
                            openOrderNumber:
                              type: integer
                              example: 0
                            positions:
                              type: array
                              items:
                                type: object
                                properties:
                                  outcomeTitle:
                                    type: string
                                  outcomeType:
                                    type: integer
                                  amount:
                                    type: number
                                  avgPrice:
                                    type: number
                            conditionId:
                              type: string
                            outcomes:
                              type: array
                              items:
                                type: object
                                properties:
                                  id:
                                    type: integer
                                    example: 0
                                  title:
                                    type: string
                                  price:
                                    type: string
                                    description: '(format: number,null)'
                                  tokenId:
                                    type: string
                                  outcomeType:
                                    type: integer
        '404':
          description: Event not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                    description: HTTP status code
                    example: 400
                  message:
                    type: string
                    description: Error message
                    example: Bad Request
                  error:
                    type: string
                    description: Error type
                    example: Bad Request
                description: Standard error response from NestJS
                example: '{"statusCode":404,"message":"Not found event","error":"Not Found"}'
        '429':
          description: Too many requests – rate limit exceeded
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                    description: HTTP status code
                    example: 400
                  message:
                    type: string
                    description: Error message
                    example: Bad Request
                  error:
                    type: string
                    description: Error type
                    example: Bad Request
                description: Standard error response from NestJS
                example: '{"statusCode":429,"message":"Too Many Requests","error":"Too Many Requests"}'
        '500':
